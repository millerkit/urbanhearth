name = "urbanhearth-preview"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[observability]
enabled = false
head_sampling_rate = 1

[observability.logs]
enabled = true
head_sampling_rate = 1
persist = true
invocation_logs = true

[observability.traces]
enabled = true
persist = true
head_sampling_rate = 1

# This file provides the base config that @astrojs/cloudflare merges into
# dist/server/wrangler.json during the preview build.
# Deploy the preview Worker with: pnpm deploy:preview
#
# SANITY_PROJECT_ID is baked into the Worker bundle at build time — it does
# NOT need to be set as a Cloudflare runtime secret. The GitHub Actions
# secret SANITY_PROJECT_ID supplies it during CI builds.
