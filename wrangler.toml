name = "urbanhearth-preview"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

# This file provides the base config that @astrojs/cloudflare merges into
# dist/server/wrangler.json during the preview build.
# Deploy the preview Worker with: pnpm deploy:preview
#
# STORYBLOK_TOKEN is baked into the Worker bundle at build time — it does
# NOT need to be set as a Cloudflare runtime secret. The GitHub Actions
# secret STORYBLOK_TOKEN supplies it during CI builds.
