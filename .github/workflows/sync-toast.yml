name: Sync Toast → Sanity

on:
  schedule:
    - cron: "0 */4 * * *" # every 4 hours
  workflow_dispatch: # manual trigger available in GitHub UI if ever needed

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: npm install --prefix . @sanity/client

      - name: Run sync
        env:
          TOAST_CLIENT_ID: ${{ secrets.TOAST_CLIENT_ID }}
          TOAST_CLIENT_SECRET: ${{ secrets.TOAST_CLIENT_SECRET }}
          TOAST_RESTAURANT_GUID: ${{ secrets.TOAST_RESTAURANT_GUID }}
          SANITY_PROJECT_ID: ${{ secrets.SANITY_PROJECT_ID }}
          SANITY_TOKEN: ${{ secrets.SANITY_TOKEN }}
          SANITY_DATASET: production
        run: node scripts/sync-toast.mjs
