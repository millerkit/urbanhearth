name: Deploy preview Worker

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build and deploy preview Worker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: '10.20.0'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Write .env.local for build
        run: echo "STORYBLOK_TOKEN=${{ secrets.STORYBLOK_TOKEN }}" > .env.local

      - name: Build preview Worker
        run: pnpm build:preview

      - name: Deploy to Cloudflare Workers
        run: pnpm wrangler deploy --config dist/server/wrangler.json
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
